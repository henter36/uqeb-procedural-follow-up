name: Deployment Package

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'backend/Uqeb.Api/Uqeb.Api.csproj'
      - 'backend/Uqeb.Api/Controllers/HealthController.cs'
      - 'backend/Uqeb.Api/Services/Health/**'
      - 'backend/Uqeb.Api/Reporting/Operations/ReportingChromiumProbe.cs'
      - '.github/workflows/deployment-package.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'backend/Uqeb.Api/Uqeb.Api.csproj'
      - 'backend/Uqeb.Api/Controllers/HealthController.cs'
      - 'backend/Uqeb.Api/Services/Health/**'
      - 'backend/Uqeb.Api/Reporting/Operations/ReportingChromiumProbe.cs'
      - '.github/workflows/deployment-package.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deployment-scripts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate Windows PowerShell 5.1 compatibility
        shell: cmd
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\tests\invoke-windows-powershell-compatibility.ps1

      - name: Validate deployment PowerShell scripts
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0 -ErrorAction Stop
          Invoke-Pester -Path .\scripts\tests\MigrationResultNormalization.Tests.ps1, .\scripts\tests\AtomicDirectorySwap.Tests.ps1, .\scripts\tests\PlaywrightSmokeTest.Tests.ps1, .\scripts\tests\PlaywrightDeployment.Tests.ps1, .\scripts\tests\ExpandArchiveSafely.Tests.ps1, .\scripts\tests\InstalledArtifactProof.Tests.ps1, .\scripts\deployment-package.Tests.ps1, .\scripts\verify-deployment-health.Tests.ps1 -Output Detailed

  production-package-structure:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install dotnet-ef tool
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef --version

      - name: Ensure LocalDB for migration script generation
        shell: pwsh
        run: |
          sqllocaldb start MSSQLLocalDB
          sqllocaldb info MSSQLLocalDB

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/uqeb-ui/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}\ms-playwright
          key: playwright-chromium-${{ hashFiles('backend/Uqeb.Api/Uqeb.Api.csproj') }}

      - name: Build offline package with Chromium
        shell: pwsh
        run: |
          $browserCache = Join-Path $env:RUNNER_TEMP 'ms-playwright'
          $env:PLAYWRIGHT_BROWSERS_PATH = $browserCache
          $buildParams = @{
            SkipBackendTests = $true
            SkipFrontendTests = $true
          }

          if ((Test-Path -LiteralPath $browserCache) -and (Get-ChildItem -LiteralPath $browserCache -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1)) {
            Write-Host "Using cached Playwright browsers from $browserCache"
            $buildParams.SkipPlaywrightBrowserDownload = $true
            $buildParams.PlaywrightBrowsersSourcePath = $browserCache
          }
          else {
            Write-Host "Playwright browser cache empty; downloading Chromium during package build."
          }

          pwsh -File .\scripts\build-production-package.ps1 @buildParams
        timeout-minutes: 90

      - name: Inspect package structure
        shell: pwsh
        run: |
          $zip = Get-ChildItem .\artifacts\production\Uqeb-*.zip | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if (-not $zip) { throw 'Package zip not found.' }
          $inspect = Join-Path $env:RUNNER_TEMP 'uqeb-package-inspect'
          Remove-Item $inspect -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive $zip.FullName $inspect
          $required = @(
            'api\Uqeb.Api.dll',
            'api\playwright.ps1',
            'web\index.html',
            'database\migrations-idempotent.sql',
            'scripts\verify-deployment-health.ps1',
            'browsers\playwright-browser-manifest.json',
            'manifest.json'
          )
          foreach ($item in $required) {
            if (-not (Test-Path (Join-Path $inspect $item))) {
              throw "Missing package item: $item"
            }
          }
          $manifest = Get-Content (Join-Path $inspect 'manifest.json') -Raw | ConvertFrom-Json
          if (-not $manifest.playwright.required) { throw 'manifest.playwright.required must be true' }
          Write-Host "Package size bytes: $($zip.Length)"
