name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj --no-restore
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj --no-restore --filter "FullyQualifiedName!~InstitutionalReportPlaywrightPdfExporterTests&FullyQualifiedName!~InstitutionalReportVisualRegressionTests&FullyQualifiedName!~TransactionPersistenceSqlServerIntegrationTests"

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj -c Release --no-restore
      - run: pwsh backend/Uqeb.Api/bin/Release/net10.0/playwright.ps1 install --with-deps chromium
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj -c Release --no-restore --filter "FullyQualifiedName~InstitutionalReportVisualRegressionTests|FullyQualifiedName~InstitutionalReportPlaywrightPdfExporterTests|FullyQualifiedName~InstitutionalReportPreviewPdfParityTests"
        env:
          REQUIRE_PLAYWRIGHT_TESTS: "1"
      - name: Upload visual artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-regression-failure-artifacts
          path: |
            backend/Uqeb.Api.Tests/Reporting/Visual/Baselines/*.actual.png
            backend/Uqeb.Api.Tests/TestResults
          if-no-files-found: ignore

  pdf-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj -c Release --no-restore
      - run: pwsh backend/Uqeb.Api/bin/Release/net10.0/playwright.ps1 install --with-deps chromium
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj -c Release --no-restore --filter "FullyQualifiedName~InstitutionalReportPlaywrightPdfExporterTests"
        env:
          REQUIRE_PLAYWRIGHT_TESTS: "1"
      - name: Upload PDF artifact on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pdf-linux-failure-artifacts
          path: backend/Uqeb.Api.Tests/TestResults
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/uqeb-ui/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: frontend/uqeb-ui
      - run: npm run lint
        working-directory: frontend/uqeb-ui
      - run: npm run build
        working-directory: frontend/uqeb-ui
      - run: npm test -- --run
        working-directory: frontend/uqeb-ui
      - run: npm run lint:css
        working-directory: frontend/uqeb-ui

  reporting-acceptance-small:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet restore backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj --no-restore
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj --no-restore --filter "FullyQualifiedName~ReportingAcceptanceBenchmarkTests.SmallBenchmark"
        env:
          RUN_REPORTING_ACCEPTANCE: "1"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: reporting-acceptance-small
          path: artifacts/reporting-acceptance/*
          if-no-files-found: ignore

  reporting-acceptance-large:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet restore backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj --no-restore
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj --no-restore --filter "FullyQualifiedName~ReportingAcceptanceBenchmarkTests.LargeBenchmark"
        env:
          RUN_REPORTING_ACCEPTANCE_LARGE: "1"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: reporting-acceptance-large
          path: artifacts/reporting-acceptance/*
          if-no-files-found: ignore

  transaction-sqlserver-integration:
    runs-on: ubuntu-latest
    env:
      MSSQL_SA_PASSWORD: YourStrong@Passw0rd
      UQEB_TRANSACTION_TEST_CONNECTION: Server=localhost,1433;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true
      REQUIRE_TRANSACTION_SQLSERVER_TESTS: "1"
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"YourStrong@Passw0rd\" -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet restore backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj -c Release --no-restore
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj -c Release --no-restore --filter "Category=SqlServer"
        env:
          REQUIRE_TRANSACTION_SQLSERVER_TESTS: "1"
          REQUIRE_FOLLOWUP_PRINT_SQLSERVER_TESTS: "1"

  build-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj --no-restore --filter "Category=BuildIntegration"

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: '3.13'
      - run: pip install --only-binary ":all:" zizmor==1.26.1
      - run: zizmor --persona regular .github/workflows/ci.yml
