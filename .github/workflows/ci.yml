name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore backend/Uqeb.Api/Uqeb.Api.csproj
      - run: dotnet build backend/Uqeb.Api/Uqeb.Api.csproj --no-restore
      - run: bash backend/Uqeb.Api/bin/Debug/net10.0/playwright.sh install chromium
      - run: dotnet test backend/Uqeb.Api.Tests/Uqeb.Api.Tests.csproj --no-restore

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/uqeb-ui/package-lock.json
      - run: npm ci
        working-directory: frontend/uqeb-ui
      - run: npm run build
        working-directory: frontend/uqeb-ui
      - run: npm test -- --run
        working-directory: frontend/uqeb-ui
