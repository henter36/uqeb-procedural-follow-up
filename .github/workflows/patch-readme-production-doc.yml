name: Patch README production guide

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-readme-production-doc.yml'

permissions:
  contents: write

jobs:
  patch-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add production guide link to README
        shell: python
        run: |
          from pathlib import Path

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")

          anchor = "📄 **[docs/simple_offline_deployment.md](docs/simple_offline_deployment.md)**"
          insertion = """📄 **[docs/simple_offline_deployment.md](docs/simple_offline_deployment.md)**

          📘 **[دليل إصدار الحزمة وترقية نفس الـartifact إلى الإنتاج](docs/production_artifact_promotion.md)**

          > **المبدأ المعتمد:** ابنِ الحزمة مرة واحدة من `main`، اختبر ملفي ZIP وSHA256 نفسيهما على Windows VM، ثم انقل **نفس الحزمة ونفس SHA256** إلى الإنتاج. لا تُعِد بناء الحزمة بعد نجاح الاختبار.
          """

          if "docs/production_artifact_promotion.md" not in text:
              if anchor not in text:
                  raise SystemExit("README deployment anchor was not found")
              text = text.replace(anchor, insertion, 1)
              path.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/patch-readme-production-doc.yml")
          if workflow.exists():
              workflow.unlink()

      - name: Commit README update
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No README change required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/patch-readme-production-doc.yml
          git commit -m "docs: link production artifact promotion guide"
          git push origin HEAD:main
